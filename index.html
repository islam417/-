<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>الطيف - دفتر التدريس</title>
  <meta name="description" content="دليلك عبر المنهاج، درساً بعد درس" />

  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#0F1712" />
  <link rel="icon" href="./icon-192.png" type="image/png" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="الطيف" />
  <meta name="mobile-web-app-capable" content="yes" />

  <link rel="stylesheet" href="./styles.css" />
  <style>
    html, body { margin: 0; padding: 0; background: #16211C; overscroll-behavior-y: none; }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="./app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
